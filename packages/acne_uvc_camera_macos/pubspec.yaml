name: acne_uvc_camera_macos
description: macOS external UVC camera support for 痘迹 app
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.11.5
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      macos:
        pluginClass: AcneUvcCameraMacosPlugin
