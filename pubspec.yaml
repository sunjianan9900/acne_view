name: acne_view
description: "痘迹 - 痘痘打卡观察 App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.31
  path_provider: ^2.1.5
  path: ^1.9.1
  camera: ^0.11.1
  intl: ^0.20.2
  uuid: ^4.5.1
  acne_uvc_camera_ios:
    path: packages/acne_uvc_camera_ios
  acne_uvc_camera_macos:
    path: packages/acne_uvc_camera_macos
  window_manager: ^0.5.1
  shared_preferences: ^2.5.3
  file_picker: ^10.1.9
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  assets:
    - assets/ance/
    - assets/face_map/
